[pytest]
addopts = -n auto
#addopts = -n 32
# Backstop against a hung test (e.g. a subprocess call with a missing
# or ineffective timeout) stalling the whole run with no indication of
# which test is stuck. This is well above the slowest legitimate test
# (test_zmodem.py's own internal 45s timeout), so it should only ever
# fire on a genuine hang, in which case pytest-timeout fails just that
# one test and reports its stack, instead of the run silently sitting
# there until something external (or someone impatient) kills it.
timeout = 120
# Configure logging capture format (shown on test failure)
log_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_date_format = %Y-%m-%d %H:%M:%S.%f

# Configure live logging (when --log-cli-level is set)
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S.%f
