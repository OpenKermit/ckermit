name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      upload-artifact:
        description: Upload built kermit binaries as artifacts
        type: boolean
        default: false
      matrix:
        description: >-
          JSON array of {os, platform, arch, make-target, label} entries
          to build/test. release.yml overrides this with the full release
          platform set. Empty here
          because workflow_call input defaults only
          apply when this workflow is actually invoked via workflow_call.
          For direct push/pull_request triggers, there's no caller
          supplying inputs, so inputs.matrix would just be '' either way.
          The real default lives in the || fallback below.
        type: string
        default: ''

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJson(inputs.matrix || '[{"os":"ubuntu-26.04","platform":"linux","arch":"amd64","make-target":"linux+ssl","label":"ubuntu26.04-amd64"},{"os":"macos-latest","platform":"macos","arch":"arm64","make-target":"macos+ssl","label":"macos-arm64"}]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libpam0g-dev \
            zlib1g-dev check python3-pytest python3-pytest-xdist \
            python3-pyftpdlib lrzsz

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install openssl@3 check lrzsz
          pip3 install --break-system-packages \
            pytest pytest-xdist pyftpdlib

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: make ${{ matrix.make-target }}

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: |
          make ${{ matrix.make-target }} \
            KSSLINC="-I$(brew --prefix openssl@3)/include" \
            KSSLLIB="-L$(brew --prefix openssl@3)/lib"

#      - name: C unit tests
#        run: make check

#      - name: Python test suite
#        run: pytest -n auto

      - name: Upload binary
        if: inputs.upload-artifact
        uses: ./.github/actions/upload-binary
        with:
          label: ${{ matrix.label }}

  # FreeBSD/NetBSD have no native GitHub-hosted runner, so these boot a
  # QEMU VM (KVM-accelerated, since guest and host arch both are x86_64)
  # inside the ubuntu-latest runner via the vmactions actions. These are
  # required jobs like any other - a failure here fails this workflow,
  # which also blocks release.yml since it calls this workflow as its
  # release gate. Package names below are best-effort and unverified:
  # there's no FreeBSD/NetBSD environment available to test-install them
  # ahead of time, unlike the Linux/macOS legs above.
  freebsd-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pkg and pip inside the VM don't persist between runs on their
      # own (only the base VM image is cached by vmactions), so we
      # give them a cache directory that lives under $GITHUB_WORKSPACE.
      # That directory is rsynced into and back out of the VM by
      # vmactions, and actions/cache persists it across runs.
      - name: Cache FreeBSD packages
        uses: actions/cache@v4
        with:
          path: |
            .ci-cache/freebsd-pkg
            .ci-cache/freebsd-pip
          key: freebsd-pkg-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            mkdir -p .ci-cache/freebsd-pkg .ci-cache/freebsd-pip
            export PIP_CACHE_DIR="$(pwd)/.ci-cache/freebsd-pip"
            export PKG_CACHEDIR="$(pwd)/.ci-cache/freebsd-pkg"
            pkg install -y openssl check lrzsz python3 py312-pip
            pip install pytest pytest-xdist pyftpdlib
          run: |
            make freebsd+ssl
#            make check
#            pytest -n auto

      - name: Upload binary
        if: inputs.upload-artifact
        uses: ./.github/actions/upload-binary
        with:
          label: freebsd-amd64

  netbsd-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # pkgin's own download cache (/var/db/pkgin/cache) has no
      # documented way to relocate it, so it isn't cached here (unlike
      # the FreeBSD leg above). pip's cache is relocatable, so we still
      # persist that across runs the same way.
      - name: Cache NetBSD pip packages
        uses: actions/cache@v4
        with:
          path: .ci-cache/netbsd-pip
          key: netbsd-pip-${{ hashFiles('.github/workflows/ci.yml') }}

      - name: Build and test on NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          prepare: |
            mkdir -p .ci-cache/netbsd-pip
            export PIP_CACHE_DIR="$(pwd)/.ci-cache/netbsd-pip"
            /usr/sbin/pkg_add pkgin
            pkgin -y update
            pkgin -y install openssl check lrzsz py313-pip
            pip3.13 install pytest pytest-xdist pyftpdlib
          run: |
            make netbsd+ssl-des
#            make check
#            pytest -n auto

      - name: Upload binary
        if: inputs.upload-artifact
        uses: ./.github/actions/upload-binary
        with:
          label: netbsd-amd64
