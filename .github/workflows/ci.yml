name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:
    inputs:
      upload-artifact:
        description: Upload built kermit binaries as artifacts
        type: boolean
        default: false
      matrix:
        description: >-
          JSON array of {os, platform, arch, make-target, label} entries
          to build/test. release.yml overrides this with the full release
          platform set. Empty here
          because workflow_call input defaults only
          apply when this workflow is actually invoked via workflow_call.
          For direct push/pull_request triggers, there's no caller
          supplying inputs, so inputs.matrix would just be '' either way.
          The real default lives in the || fallback below.
        type: string
        default: ''

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        include: >-
          ${{ fromJson(inputs.matrix || '[{"os":"ubuntu-26.04","platform":"linux","arch":"amd64","make-target":"linux+ssl","label":"ubuntu26.04-amd64"},{"os":"macos-latest","platform":"macos","arch":"arm64","make-target":"macos+ssl","label":"macos-arm64"}]') }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libssl-dev libpam0g-dev \
            zlib1g-dev check python3-pytest python3-pytest-xdist \
            python3-pytest-timeout python3-pyftpdlib lrzsz

      - name: Install macOS dependencies
        if: matrix.platform == 'macos'
        run: |
          brew install openssl@3 check lrzsz
          pip3 install --break-system-packages \
            pytest pytest-xdist pytest-timeout pyftpdlib
          # openssl@3 is keg-only, so brew install never links it onto
          # PATH. Plain "openssl" would otherwise resolve to macOS's own
          # /usr/bin/openssl (LibreSSL), which test_ssl.py's PKI fixture
          # can't use since it doesn't support the "x509 -req -not_before
          # /-not_after" options that fixture relies on to create an
          # already-expired certificate.
          echo "$(brew --prefix openssl@3)/bin" >> "$GITHUB_PATH"

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: make ${{ matrix.make-target }}

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: |
          make ${{ matrix.make-target }} \
            KSSLINC="-I$(brew --prefix openssl@3)/include" \
            KSSLLIB="-L$(brew --prefix openssl@3)/lib"

      - name: C unit tests
        run: make check

      - name: Python test suite
        env:
          # Capture kermit's internal "log debug" trace for
          # every wermit_loopback session, dumped into the pytest
          # failure report.
          KERMIT_TEST_DEBUG_LOOPBACK: 1
        run: pytest --log-level=DEBUG

      - name: Upload binary
        if: inputs.upload-artifact
        uses: ./.github/actions/upload-binary
        with:
          label: ${{ matrix.label }}

  # FreeBSD/NetBSD have no native GitHub-hosted runner, so these boot a
  # QEMU VM (KVM-accelerated, since guest and host arch both are x86_64)
  # inside the ubuntu-latest runner via the vmactions actions. These are
  # required jobs like any other - a failure here fails this workflow,
  # which also blocks release.yml since it calls this workflow as its
  # release gate. Package names below are best-effort and unverified:
  # there's no FreeBSD/NetBSD environment available to test-install them
  # ahead of time, unlike the Linux/macOS legs above.
  freebsd-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test on FreeBSD
        uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: |
            pkg install -y openssl check pkgconf lrzsz python3 py312-pip
            pip install pytest pytest-xdist pytest-timeout pyftpdlib
          run: |
            make freebsd+ssl
            make check
            pytest --log-level=DEBUG

      - name: Upload binary
        if: inputs.upload-artifact
        uses: ./.github/actions/upload-binary
        with:
          label: freebsd-amd64

  netbsd-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build and test on NetBSD
        uses: vmactions/netbsd-vm@v1
        with:
          usesh: true
          prepare: |
            /usr/sbin/pkg_add pkgin
            pkgin -y update
            pkgin -y install openssl check lrzsz py313-pip pkgconf
            pip3.13 install pytest pytest-xdist pytest-timeout pyftpdlib
          run: |
            # pkgin's openssl installs to /usr/pkg/bin, but NetBSD's
            # PATH puts /usr/bin ahead of it, so plain
            # "openssl" resolves to the older base-system binary
            # instead. That one doesn't support the "x509 -req
            # -not_before/-not_after" options that test_ssl
            # relies on to create an expired
            # certificate, so put /usr/pkg/bin first.
            export PATH="/usr/pkg/bin:/usr/pkg/sbin:$PATH"
            make netbsd+ssl-des
            make check
            pytest --log-level=DEBUG

      - name: Upload binary
        if: inputs.upload-artifact
        uses: ./.github/actions/upload-binary
        with:
          label: netbsd-amd64
